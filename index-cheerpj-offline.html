<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Example</title>
    <script src="./cheerpj/4.3/loader.js"></script>

    <style>
        html {
            overflow: hidden; 
            background-color: #111;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(1.5); 
            transform-origin: center;
        }
        .interfaz-juego {
            display: grid;
            grid-template-columns: 240px 180px; 
            gap: 25px; 
            align-items: center;
        }
        #contenedor-juego {
            width: 240px;
            height: 369px;
            position: relative;
            overflow: hidden; 
            image-rendering: pixelated; 
            transition: filter 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }  

        #contenedor-juego.pausado {
            filter: blur(4px) grayscale(50%);
            pointer-events: none;
        }
        .teclado-celular {
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #444;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.2), 0 8px 16px rgba(0,0,0,0.6);
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
            width: 150px;
        }
        .btn-cel {
            background: linear-gradient(135deg, #444, #2b2b2b);
            color: #fff;
            border: 1px solid #111;
            border-radius: 6px;
            padding: 8px 0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 0 #151515, inset 0 1px 0 rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.05s ease;
        }
        .btn-cel span {
            font-size: 7px;
            color: #aaa;
            font-weight: normal;
            text-transform: uppercase;
            margin-top: 1px;
            letter-spacing: 0.5px;
        }
        .btn-cel:active, .btn-cel.activo {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #151515, inset 0 1px 2px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #2b2b2b, #1e1e1e);
        }
        .btn-cel[data-tecla="Enter"] {
            background: linear-gradient(135deg, #555, #333);
            color: #ffcc00;
        }
    </style>
</head>
<body>

    <div class="interfaz-juego">
        
        <div id="contenedor-juego"></div>

        <div class="teclado-celular">
            <div class="btn-cel" data-tecla="1">7 <span></span></div>
            <div class="btn-cel" data-tecla="ArrowUp">8 <span>▲ (Arriba)</span></div>
            <div class="btn-cel" data-tecla="3">9 <span>def</span></div>
            
            <div class="btn-cel" data-tecla="ArrowLeft">4 <span>◀ (Izq)</span></div>
            <div class="btn-cel" data-tecla="Enter">5 <span>OK / OK</span></div>
            <div class="btn-cel" data-tecla="ArrowRight">6 <span>▶ (Der)</span></div>
            
            <div class="btn-cel" data-tecla="7">1 <span></span></div>
            <div class="btn-cel" data-tecla="ArrowDown">2 <span>▼ (Abajo)</span></div>
            <div class="btn-cel" data-tecla="9">3 <span></span></div>
            
            <div class="btn-cel" data-tecla="e">* <span>E</span></div>
            <div class="btn-cel" data-tecla="0">0 <span></span></div>
            <div class="btn-cel" data-tecla="r"># <span>R</span></div>
        </div>

    </div>

    <script>
        window.juegoPausado = false;

        (async function () {
            await cheerpjInit();
            const miDiv = document.getElementById("contenedor-juego");
            
            cheerpjCreateDisplay(240, 369, miDiv);
            
            cheerpjRunMain(
                "org.recompile.freej2me.FreeJ2ME",
                "/app/app/freej2me.jar:/app/app/freej2me-sdl.jar",
                "/app/game/game.jar"
            );

            
            function simularTeclado(tipoEvento, nombreTecla) {
                
                if (window.juegoPausado && nombreTecla !== "p") return;

                const evento = new KeyboardEvent(tipoEvento, {
                    key: nombreTecla,
                    keyCode: obtenerKeyCode(nombreTecla),
                    bubbles: true,
                    cancelable: true
                });
                window.dispatchEvent(evento);
            }

            
            function obtenerKeyCode(tecla) {
                switch(tecla) {
                    case "ArrowUp": return 38;
                    case "ArrowDown": return 40;
                    case "ArrowLeft": return 37;
                    case "ArrowRight": return 39;
                    case "Enter": return 13;
                    case "x": return 88;
                    case "c": return 67;
                    case "v": return 86;
                    case "p": return 80;
                    default: return 0;
                }
            }          
            document.querySelectorAll(".btn-cel").forEach(boton => {
                const teclaDestino = boton.getAttribute("data-tecla");

                boton.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    simularTeclado("keydown", teclaDestino);
                });


                boton.addEventListener("mouseup", (e) => {
                    e.preventDefault();
                    simularTeclado("keyup", teclaDestino);
                });
                boton.addEventListener("mouseleave", (e) => {
                    if (e.buttons === 1) {
                        simularTeclado("keyup", teclaDestino);
                    }
                });
            });
            

            window.addEventListener("keydown", function(e) {
                const t = e.key.toLowerCase();
                
                if (t === "p") {
                    alternarPausa();
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return;
                }

                if (window.juegoPausado) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return;
                }
                vincularBotonVisual(e.key, true);
            }, true);

            window.addEventListener("keyup", function(e) {
                if (window.juegoPausado || e.key.toLowerCase() === "p") {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    return;
                }
                
            }, true);

            function alternarPausa() {
                window.juegoPausado = !window.juegoPausado;
                if (window.juegoPausado) {
                    miDiv.classList.add("pausado");
                } else {
                    miDiv.classList.remove("pausado");
                }
            }
        })();
    </script>
</body>
</html>
